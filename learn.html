<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="description" content="DRUPAK x NEXA Core Terminal - Authorized B2B operations and telemetry enterprise console.">
<meta name="keywords" content="Drupak x Nexa Core Terminal, Drupak, Nexa Core, Drupak Nexa">
<meta name="author" content="Ahmad Wisal">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRUPAK x NEXA Core Terminal</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #06070d;
            color: #38bdf8;
            font-family: 'Courier New', Courier, monospace;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .container {
            width: 100%;
            max-width: 900px;
        }
        .launch-btn {
            background: linear-gradient(135deg, #1e3a8a, #0284c7);
            color: #ffffff;
            border: 2px solid #38bdf8;
            padding: 20px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
            cursor: pointer;
            border-radius: 5px;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
            transition: all 0.3s ease;
            text-align: center;
        }
        .launch-btn:hover {
            box-shadow: 0 0 35px rgba(56, 189, 248, 0.8);
            transform: scale(1.03);
        }
        #terminal-box {
            display: none;
            background-color: #0b0f19;
            border: 2px solid #1e293b;
            border-radius: 8px;
            padding: 25px;
            width: 100%;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
        }
        .terminal-header {
            border-bottom: 2px solid #1e293b;
            padding-bottom: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .terminal-title {
            color: #38bdf8;
            font-weight: bold;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .status-dot {
            width: 12px;
            height: 12px;
            background-color: #22c55e;
            border-radius: 5px;
            box-shadow: 0 0 10px #22c55e;
        }
        #terminal-body {
            height: 450px;
            overflow-y: auto;
            line-height: 1.6;
            font-size: 0.95rem;
            margin-bottom: 20px;
            padding-right: 10px;
        }
        #terminal-body::-webkit-scrollbar {
            width: 6px;
        }
        #terminal-body::-webkit-scrollbar-thumb {
            background-color: #1e293b;
            border-radius: 3px;
        }
        #input-line {
            display: none;
            align-items: center;
            border-top: 1px solid #1e293b;
            padding-top: 15px;
        }
        .prompt {
            color: #22c55e;
            font-weight: bold;
            margin-right: 10px;
            white-space: nowrap;
        }
        #user-command {
            background: none;
            border: none;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1rem;
            width: 100%;
            outline: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="start-screen" style="text-align: center;">
            <button class="launch-btn">INITIALIZE DRUPAK x NEXA CORE TERMINAL</button>
        </div>

        <div id="terminal-box">
            <div class="terminal-header">
                <div class="terminal-title">🛸 DRUPAK B2B ENTERPRISE CONTROL PLATFORM v2.0</div>
                <div class="status-dot"></div>
            </div>
            <div id="terminal-body"></div>
            <div id="input-line">
                <span class="prompt">DRUPAK@B2B_CORE:~#</span>
                <input type="text" id="user-command" placeholder="Enter Security PIN to unlock console..." autofocus autocomplete="off">
            </div>
        </div>
    </div>

<script>
// 🎵 Professional Audio Synthesis Engine
function playSound(type) {
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    if (type === 'click') {
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        oscillator.type = 'sine';
        oscillator.frequency.setValueAtTime(900, audioCtx.currentTime);
        gainNode.gain.setValueAtTime(0.04, audioCtx.currentTime);
        oscillator.start();
        gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
        oscillator.stop(audioCtx.currentTime + 0.05);
    } 
    else if (type === 'error') {
        const duration = 0.18;
        let osc = audioCtx.createOscillator();
        let gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.type = 'sawtooth'; osc.frequency.setValueAtTime(140, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
        osc.start(); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
        osc.stop(audioCtx.currentTime + duration);
    }
    else if (type === 'success') {
        const speech = new SpeechSynthesisUtterance();
        speech.text = "Secure Connection Established. Welcome to Drupak Corporate Matrix Base.";
        speech.lang = 'en-US';
        speech.rate = 0.9; 
        window.speechSynthesis.speak(speech);
    }
}

// Launch Trigger Functionality
document.querySelector('.launch-btn').addEventListener('click', function() {
    playSound('click');
    document.getElementById('start-screen').style.display = 'none';
    const terminal = document.getElementById('terminal-box');
    terminal.style.display = 'block';
    
    const bootLines = [
        "📡 Accessing global enterprise data channels...",
        "🔒 Encrypting connection via secure Peshawar Node gateway...",
        "⚡ Syncing with global Drupal architecture protocols...",
        "⚠️ SECURITY PROTOCOL REQ: System is encrypted.",
        "🔑 PLEASE ENTER THE 4-DIGIT SECURITY PIN TO PROCEED."
    ];
    
    let body = document.getElementById('terminal-body');
    let idx = 0;
    
    function printBoot() {
        if (idx < bootLines.length) {
            body.innerHTML += bootLines[idx] + "<br>";
            idx++;
            playSound('click');
            setTimeout(printBoot, 700);
        } else {
            document.getElementById('input-line').style.display = 'flex';
            document.getElementById('user-command').focus();
        }
    }
    printBoot();
});

let isAuthorized = false;

document.getElementById('user-command').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
        let inputField = this;
        let userInput = inputField.value.trim();
        let body = document.getElementById('terminal-body');
        
        // 🔒 Phase 1: Security Handshake Engine
        if (!isAuthorized) {
            body.innerHTML += `<span style="color: #eab308;">🔑 AUTHENTICATING ACCESS PIN: *******</span><br>`;
            
            if (userInput === '2580') {
                isAuthorized = true;
                playSound('success');
                body.innerHTML += "<span style=\"color: #22c55e; font-weight: bold;\">✅ ACCESS GRANTED. DRUPAK ENTERPRISE ENVIRONMENT ACTIVATED.</span><br>";
                body.innerHTML += "Type '<span style='color: #22c55e;'>help</span>' to run the B2B Architecture Diagnostic Suite.<br><br>";
                inputField.placeholder = "Type corporate utility command...";
            } else {
                playSound('error');
                body.innerHTML += "<span style=\"color: #ef4444; font-weight: bold;\">❌ ACCESS DENIED: INVALID SYSTEM PIN. RE-TRY REQUIRED.</span><br>";
            }
            inputField.value = "";
            body.scrollTop = body.scrollHeight;
            return;
        }

        // 🎛️ Phase 2: High-Level B2B Architecture Command Center
        playSound('click');
        let command = userInput.toLowerCase();
        body.innerHTML += `<span style="color: #22c55e;">DRUPAK@B2B_CORE:~# ${userInput}</span><br>`;
        
        if (command === 'help') {
            body.innerHTML += "<span style='color: #38bdf8; font-weight: bold;'>📊 DRUPAK WEB CAPABILITIES DIAGNOSTIC MENU:</span><br>" +
                              "▪ <b>drupak-overview</b>      - High-level core business focal structure<br>" +
                              "▪ <b>types-all</b>            - Comprehensive breakdown of all target web applications<br>" +
                              "▪ <b>type-custom</b>          - Custom web applications workflow details<br>" +
                              "▪ <b>type-portal</b>          - Enterprise-level portals & content management specs<br>" +
                              "▪ <b>type-ecommerce</b>       - Drupal Commerce conversion funnel details<br>" +
                              "▪ <b>type-mobile</b>          - Cross-device responsive parameters<br>" +
                              "▪ <b>type-seo</b>             - Load acceleration and performance metrics<br>" +
                              "▪ <b>type-migration</b>       - Core system CMS version upgrades specs<br>" +
                              "▪ <b>drupak-consultancy</b>   - Staff augmentation and professional training structures<br>" +
                              "▪ <b>tech-stack</b>           - Core engineering architecture & technologies used<br>" +
                              "▪ <b>process-all</b>          - Full 5-phase corporate methodology roadmap<br>" +
                              "▪ <b>phase-1</b>              - Planning & Analysis parameters<br>" +
                              "▪ <b>phase-2</b>              - UI/UX Interactive Layout Design parameters<br>" +
                              "▪ <b>phase-3</b>              - Custom Drupal Engineering & Development phase<br>" +
                              "▪ <b>phase-4</b>              - Comprehensive QA, security and penetration testing<br>" +
                              "▪ <b>phase-5</b>              - Production deployment, deployment pipelines & support<br>" +
                              "▪ <b>community-impact</b>     - Global event contributions, webinars, and education metrics<br>" +
                              "▪ <b>matrix-stream</b>        - Visual server encryption telemetry visualization<br>" +
                              "▪ <b>clear</b>                - Reset dashboard terminal display logs<br>" +
                              "▪ <b>lock</b>                 - Instant lock and system encryption re-arm<br>";

        } else if (command === 'drupak-overview') {
            body.innerHTML += "🏢 <b>Drupak B2B Focal Focus:</b><br>" +
                              "Drupak relies exclusively on Drupal, leveraging its versatility to build secure, scalable, and highly functional websites for clients worldwide while supporting internal teams through guidance, training, and consultancy services.<br>";

        } else if (command === 'types-all') {
            body.innerHTML += "🌐 <b>Types of Websites Drupak Builds:</b><br>" +
                              "1. Custom Web Applications (Interactive Workflows)<br>" +
                              "2. Enterprise-Level Web Portals (Dynamic Data)<br>" +
                              "3. Full-featured E-commerce Platforms (Drupal Commerce)<br>" +
                              "4. Mobile-friendly Sites (Seamless Cross-Device Experience)<br>" +
                              "5. SEO-optimized & High-Performance Platforms<br>" +
                              "6. Migrated or Upgraded Drupal Systems<br>";

        } else if (command === 'type-custom') {
            body.innerHTML += "🛠️ <b>Custom Web Applications Module:</b><br>" +
                              "Tailored solutions meticulously engineered for complex business workflows, multi-tier permissions, and highly interactive enterprise-level platforms.<br>";

        } else if (command === 'type-portal') {
            body.innerHTML += "🗄️ <b>Web Portals Architecture:</b><br>" +
                              "Enterprise-level portal architecture optimized to manage intensive content structures, granular user access controls, and real-time complex dynamic data streams.<br>";

        } else if (command === 'type-ecommerce') {
            body.innerHTML += "🛍️ <b>E-Commerce Platforms Integration:</b><br>" +
                              "Full-featured Drupal Commerce ecosystems crafted to convert. Guiding enterprise users flawlessly from first discovery click straight to a secure automated checkout pipeline.<br>";

        } else if (command === 'type-mobile') {
            body.innerHTML += "📱 <b>Mobile-Friendly Optimization Engine:</b><br>" +
                              "Highly responsive liquid layouts optimized for flawless, seamless visual experiences across desktop grids, tablet viewpoints, and mobile smartphones natively.<br>";

        } else if (command === 'type-seo') {
            body.innerHTML += "📈 <b>SEO & High-Performance Infrastructure:</b><br>" +
                              "Websites specifically engineered for top-tier search engine indexing and ranking, featuring lightning-fast server side execution and optimized asset delivery.<br>";

        } else if (command === 'type-migration') {
            body.innerHTML += "🔄 <b>CMS Migration & Upgrade Pipeline:</b><br>" +
                              "Structured execution modules involving complete database and layout migration from legacy platforms, or upgrading older legacy Drupal architectures directly to the latest stable release safely.<br>";

        } else if (command === 'drupak-consultancy') {
            body.innerHTML += "🤝 <b>Consultancy, Training & Staff Augmentation:</b><br>" +
                              "Drupak provides strategic technology consultancy, specialized staff augmentation, and rigorous technical training, directly reinforcing internal client corporate development teams and optimizing external workflows.<br>";

        } else if (command === 'tech-stack') {
            body.innerHTML += "⚡ <b>Core Engineering Architecture Specs:</b><br>" +
                              "▪ <b>Engine:</b> Drupal Core Exclusive Framework<br>" +
                              "▪ <b>Modules:</b> Custom Core Module & Custom Theme Development tailored to unique visuals<br>" +
                              "▪ <b>Styling Fluidity:</b> Tailwind CSS Utility Engine for cutting-edge layouts<br>" +
                              "▪ <b>Speed:</b> Advanced Caching Engine & deep level multi-tier Performance Optimization integrations<br>" +
                              "▪ <b>Transaction Protocol:</b> Drupal Commerce Integration Framework<br>";

        } else if (command === 'process-all') {
            body.innerHTML += "🗺️ <b>The 5-Phase Development Model Lifecycle:</b><br>" +
                              "Phase 1: Planning and Analysis ➔ Phase 2: Interactive Design ➔ Phase 3: Drupal Core Development ➔ Phase 4: Rigorous Quality Assurance & Security Testing ➔ Phase 5: Production Deployment and Continuous Support.<br>";

        } else if (command === 'phase-1') {
            body.innerHTML += "📋 <b>Phase 1: Planning and Analysis Lifecycle:</b><br>" +
                              "Deep dive diagnostic sessions geared entirely towards understanding unique corporate client specifications and clearly mapping out project scopes, resources, and milestone deliverables.<br>";

        } else if (command === 'phase-2') {
            body.innerHTML += "🎨 <b>Phase 2: UI/UX Interactive Layout Design:</b><br>" +
                              "Crafting immersive, highly responsive, user-friendly, and visually breath-taking wireframes and production mockups suited for modern professional aesthetics.<br>";

        } else if (command === 'phase-3') {
            body.innerHTML += "💻 <b>Phase 3: Core Drupal Development & Assembly:</b><br>" +
                              "Full scale heavy infrastructure code engineering. Writing custom modules, creating pixel-perfect themes, and executing secure back-end API integrations utilizing strict CMS guidelines.<br>";

        } else if (command === 'phase-4') {
            body.innerHTML += "🛡️ <b>Phase 4: Comprehensive QA & Security Audits:</b><br>" +
                              "Strict stress testing, cross-browser responsiveness validation, loading speed audits, and airtight security infrastructure pen-testing to guarantee zero application flaws.<br>";

        } else if (command === 'phase-5') {
            body.innerHTML += "🚀 <b>Phase 5: Production Deployment & Continuous SLA Support:</b><br>" +
                              "Safely launching the platform to global live cloud servers. Supplying continuous support framework, automated maintenance workflows, and technical training modules for client engineering squads.<br>";

        } else if (command === 'community-impact') {
            body.innerHTML += "🌍 <b>Global Drupal Community Contribution:</b><br>" +
                              "Drupak actively contributes back to the global open-source community by organizing structured developer training programs, educational technical webinars, and participating in major worldwide global development summits.<br>";

        } else if (command === 'matrix-stream') {
            body.innerHTML += "<span style='color: #38bdf8;'>[ PARSING DRUPAK REPOSITORY TELEMETRY STREAM... ]</span><br>";
            let count = 0;
            let stream = setInterval(() => {
                let codeWords = ["DRUPAL_CORE", "TAILWIND_CSS", "B2B_PORTAL", "ECOM_SECURE", "CACHING_ACTIVE", "QA_PASSED"];
                let dataLine = "";
                for(let m=0; m<5; m++) {
                    dataLine += codeWords[Math.floor(Math.random() * codeWords.length)] + " // 0x" + Math.floor(Math.random()*16777215).toString(16).toUpperCase() + " | ";
                }
                body.innerHTML += `<span style="color: #16a34a; font-size: 0.85rem;">${dataLine}</span><br>`;
                body.scrollTop = body.scrollHeight;
                count++;
                if(count > 12) clearInterval(stream); 
            }, 120);

        } else if (command === 'lock') {
            isAuthorized = false;
            body.innerHTML += "<span style=\"color: #eab308; font-weight: bold;\">🔒 SYSTEM LOCKED. TELEMETRY CORES SHUTTING DOWN.</span><br>";
            inputField.placeholder = "Enter Security PIN to unlock console...";
        } else if (command === 'clear') {
            body.innerHTML = "";
        } else if (command === "") {
            // Empty Enter handler
        } else {
            body.innerHTML += `❌ Enterprise code command '${command}' unrecognized. Run '<span style='color:#38bdf8;'>help</span>' for authorized corporate operations dashboard.<br>`;
        }
        
        inputField.value = "";
        body.scrollTop = body.scrollHeight;
    }
});
</script>
</body>
</html>
